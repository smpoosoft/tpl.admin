<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Icons Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 24px; background: #f5f5f5; }
    h1 { margin-bottom: 24px; font-size: 20px; color: #333; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 16px; }
    .item { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 16px 12px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .item svg { width: 24px; height: 24px; }
    .item span { font-size: 12px; color: #666; word-break: break-all; text-align: center; }
  </style>
</head>
<body>
  <h1>Icons Preview</h1>
  <div class="grid" id="iconGrid"></div>

  <script type="module">
    const ICON_NAMES = [
      'arrow_down', 'arrow_left', 'arrow_right', 'arrow_up',
      'check', 'chevron_down', 'chevron_left', 'chevron_right', 'chevron_up',
      'close', 'danger', 'info', 'loading', 'minus', 'plus',
      'search', 'success', 'warning'
    ];

    const grid = document.getElementById('iconGrid');
    const parser = new DOMParser();

    const modules = await Promise.all(
      ICON_NAMES.map(name => import(`./src/components/widget/icons/${name}.ts`).catch(() => null))
    );

    ICON_NAMES.forEach((name, i) => {
      const body = modules[i]?.ICON_BODY ?? '';

      const item = document.createElement('div');
      item.className = 'item';

      const svgString = `<svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor" style="color:#333">${body}</svg>`;
      const svgDoc = parser.parseFromString(svgString, 'image/svg+xml');
      const svg = document.importNode(svgDoc.documentElement, true);

      const label = document.createElement('span');
      label.textContent = name;

      item.appendChild(svg);
      item.appendChild(label);
      grid.appendChild(item);
    });
  </script>
</body>
</html>
