        - generic [ref=e1493]:
          - heading "Screen Reader" [level=3] [ref=e1494]
          - paragraph [ref=e1495]: Sidebar is a headless compound component and does not define a specific ARIA role by default. Use semantic elements such as nav or aside with aria-label or aria-labelledby to describe the purpose of the sidebar based on your layout.
          - paragraph [ref=e1496]: When a sidebar can be collapsed or displayed offcanvas, the trigger should describe the relationship with the sidebar using aria-controls and expose the current state with aria-expanded. In layouts with multiple sidebars, provide the target prop to SidebarTrigger so it toggles the intended sidebar.
          - paragraph [ref=e1497]: SidebarMenu renders a semantic list structure by default. Menu items are expected to contain interactive elements such as links or buttons. Collapsible SidebarMenuItem components add aria-expanded to their SidebarMenuButton automatically.
