<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Icon Explorer</title>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: rgba(30, 41, 59, 0.5);
            --bg-tertiary: rgba(15, 23, 42, 0.6);
            --border-color: rgba(255, 255, 255, 0.1);
            --border-accent: rgba(56, 189, 248, 0.3);
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --text-icon: #cbd5e1;
            --accent-color: #38bdf8;
            --accent-gradient: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%);
            --card-bg: rgba(30, 41, 59, 0.5);
            --card-hover-border: rgba(56, 189, 248, 0.5);
            --card-hover-shadow: rgba(56, 189, 248, 0.3);
            --btn-bg: rgba(51, 65, 85, 0.9);
            --btn-hover-bg: #38bdf8;
            --btn-hover-text: #0f172a;
            --modal-overlay: rgba(0, 0, 0, 0.7);
            --modal-bg: rgba(30, 41, 59, 0.95);
            --code-bg: rgba(15, 23, 42, 0.8);
            --toast-bg: rgba(30, 41, 59, 0.95);
            --search-bg: rgba(15, 23, 42, 0.6);
            --status-dot-default: #64748b;
            --status-dot-loading: #fbbf24;
            --status-dot-success: #10b981;
            --status-dot-error: #ef4444;
        }

        [data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-secondary: rgba(255, 255, 255, 0.7);
            --bg-tertiary: rgba(241, 245, 249, 0.8);
            --border-color: rgba(0, 0, 0, 0.1);
            --border-accent: rgba(14, 165, 233, 0.4);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #64748b;
            --text-icon: #334155;
            --accent-color: #0ea5e9;
            --accent-gradient: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%);
            --card-bg: rgba(255, 255, 255, 0.8);
            --card-hover-border: rgba(14, 165, 233, 0.5);
            --card-hover-shadow: rgba(14, 165, 233, 0.2);
            --btn-bg: rgba(226, 232, 240, 0.9);
            --btn-hover-bg: #0ea5e9;
            --btn-hover-text: #ffffff;
            --modal-overlay: rgba(0, 0, 0, 0.5);
            --modal-bg: rgba(255, 255, 255, 0.95);
            --code-bg: rgba(241, 245, 249, 0.9);
            --toast-bg: rgba(255, 255, 255, 0.95);
            --search-bg: rgba(241, 245, 249, 0.8);
            --status-dot-default: #94a3b8;
            --status-dot-loading: #f59e0b;
            --status-dot-success: #10b981;
            --status-dot-error: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .container { max-width: 1400px; margin: 0 auto; }

        header {
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header-content { flex: 1; }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .subtitle { color: var(--text-muted); font-size: 0.85rem; }

        .theme-toggle {
            background: var(--bg-secondary);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            padding: 0.6rem 1rem;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .theme-toggle:hover {
            border-color: var(--border-accent);
            background: var(--bg-tertiary);
        }

        .theme-toggle svg {
            width: 18px;
            height: 18px;
            transition: transform 0.3s ease;
        }

        .theme-toggle:hover svg { transform: rotate(15deg); }

        .status-bar {
            background: var(--bg-secondary);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--status-dot-default);
        }

        .status-dot.loading {
            background: var(--status-dot-loading);
            animation: pulse 1.5s ease-in-out infinite;
        }

        .status-dot.success { background: var(--status-dot-success); }
        .status-dot.error { background: var(--status-dot-error); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .search-bar {
            background: var(--bg-secondary);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            margin-bottom: 2rem;
            display: none;
        }

        .search-bar.visible { display: block; }

        .search-input {
            width: 100%;
            background: var(--search-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            padding: 0.6rem 1rem;
            color: var(--text-primary);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus { border-color: var(--border-accent); }
        .search-input::placeholder { color: var(--text-muted); }

        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 1.125rem;
        }

        .icon-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            padding: 1.125rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            min-height: 120px;
            position: relative;
            user-select: none;
        }

        .icon-card:hover {
            transform: translateY(-4px);
            border-color: var(--card-hover-border);
            box-shadow: 0 7.5px 22.5px -7.5px var(--card-hover-shadow);
        }

        .icon-card:active {
            transform: translateY(-2px) scale(0.98);
        }

        .icon-card.copied {
            border-color: var(--status-dot-success);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.3);
        }

        .icon-svg {
            color: var(--accent-color);
            width: 36px;
            height: 36px;
            margin-bottom: 0.75rem;
            transition: all 0.3s;
        }

        .icon-card:hover .icon-svg {
            transform: scale(1.1);
            filter: drop-shadow(0 0 11px var(--card-hover-shadow));
        }

        .icon-name {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--text-icon);
            text-align: center;
            word-break: break-all;
        }

        .icon-actions {
            position: absolute;
            top: 0.375rem;
            right: 0.375rem;
            opacity: 0;
            transition: opacity 0.2s;
            display: flex;
            gap: 0.2rem;
            z-index: 10;
        }

        .icon-card:hover .icon-actions { opacity: 1; }

        .action-btn {
            padding: 0.2rem;
            border-radius: 0.2rem;
            border: none;
            background: var(--btn-bg);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn:hover {
            background: var(--btn-hover-bg);
            color: var(--btn-hover-text);
        }

        .action-btn svg {
            width: 10.5px;
            height: 10.5px;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
            grid-column: 1 / -1;
        }

        .category-section { margin-bottom: 2.25rem; }

        .category-header {
            display: flex;
            align-items: center;
            gap: 0.55rem;
            margin-bottom: 1.125rem;
            padding-bottom: 0.55rem;
            border-bottom: 1px solid var(--border-color);
        }

        .category-icon {
            width: 24px;
            height: 24px;
            background: var(--accent-gradient);
            border-radius: 0.375rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.65rem;
            font-weight: 600;
        }

        .category-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .category-count {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-left: auto;
        }

        .auth-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 2rem;
        }

        .auth-card {
            background: var(--modal-bg);
            border: 1px solid var(--border-color);
            border-radius: 1.5rem;
            padding: 3rem;
            max-width: 560px;
            width: 100%;
            text-align: center;
        }

        .auth-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 1.5rem;
            background: var(--accent-gradient);
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .auth-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .auth-desc {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .path-box {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-accent);
            border-radius: 0.75rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .path-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .path-value {
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: var(--accent-color);
            word-break: break-all;
            line-height: 1.5;
        }

        .copy-path-btn {
            margin-top: 0.75rem;
            padding: 0.4rem 0.8rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border-accent);
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-color);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .copy-path-btn:hover { background: rgba(56, 189, 248, 0.2); }

        .auth-btn {
            padding: 0.75rem 2rem;
            border-radius: 0.75rem;
            border: none;
            background: var(--accent-gradient);
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px -10px rgba(14, 165, 233, 0.5);
        }

        .auth-hint {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .toast {
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            background: var(--toast-bg);
            border: 1px solid var(--border-color);
            font-size: 0.85rem;
            animation: slideIn 0.3s ease-out;
            color: var(--text-primary);
        }

        .toast.success { border-left: 3px solid var(--status-dot-success); }
        .toast.error { border-left: 3px solid var(--status-dot-error); }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .modal {
            position: fixed;
            inset: 0;
            background: var(--modal-overlay);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 2rem;
        }

        .modal-content {
            background: var(--modal-bg);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 2rem;
            max-width: 600px;
            width: 100%;
            max-height: 80vh;
            overflow: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .modal-title { font-size: 1.25rem; font-weight: 600; color: var(--text-primary); }

        .modal-close {
            padding: 0.5rem;
            border-radius: 0.5rem;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .modal-close:hover { background: var(--border-color); }

        .code-block {
            background: var(--code-bg);
            border-radius: 0.5rem;
            padding: 1rem;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: var(--accent-color);
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .modal-actions { margin-top: 1rem; display: flex; justify-content: flex-end; }

        .modal-btn {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            border: none;
            background: var(--accent-color);
            color: #0f172a;
            font-weight: 600;
            cursor: pointer;
        }

        .modal-btn:hover { opacity: 0.9; }

        @media (max-width: 768px) {
            .icon-grid { grid-template-columns: repeat(2, 1fr); }
            header { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div id="auth-overlay" class="auth-overlay" style="display: none;">
        <div class="auth-card">
            <div class="auth-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            </div>
            <h2 class="auth-title">需要授权访问项目目录</h2>
            <p class="auth-desc">已自动识别到项目路径，请在文件选择器中导航到该目录并授权</p>

            <div class="path-box">
                <div class="path-label">项目根目录路径</div>
                <div class="path-value" id="project-path">检测中...</div>
                <button class="copy-path-btn" id="copy-path-btn">复制路径</button>
            </div>

            <button id="auth-btn" class="auth-btn">选择此目录</button>
            <p class="auth-hint">授权后会自动加载图标，后续打开无需再次操作</p>
        </div>
    </div>

    <div class="container">
        <header>
            <div class="header-content">
                <h1>SVG Icon Explorer</h1>
                <p class="subtitle">自动识别项目路径 + File System Access API</p>
            </div>
            <button class="theme-toggle" id="theme-toggle">
                <svg id="theme-icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                <svg id="theme-icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                <span id="theme-text">明亮模式</span>
            </button>
        </header>

        <div class="status-bar">
            <div class="status-dot" id="status-dot"></div>
            <span id="status-text">初始化中...</span>
        </div>

        <div class="search-bar" id="search-bar">
            <input type="text" class="search-input" id="search-input" placeholder="搜索分组名或图标名...">
        </div>

        <div id="icon-container">
            <div class="empty-state"><p>等待加载...</p></div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script type="module">
        const CONFIG = {
            ICON_SUBDIR: 'src/assets/icons',
            DB_NAME: 'IconExplorerDB',
            DB_STORE: 'directoryHandles',
            DB_KEY: 'projectRoot',
            THEME_KEY: 'iconExplorerTheme',
        };

        const iconContainer = document.getElementById('icon-container');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const authOverlay = document.getElementById('auth-overlay');
        const authBtn = document.getElementById('auth-btn');
        const projectPathEl = document.getElementById('project-path');
        const copyPathBtn = document.getElementById('copy-path-btn');
        const toastContainer = document.getElementById('toast-container');
        const searchBar = document.getElementById('search-bar');
        const searchInput = document.getElementById('search-input');
        const themeToggle = document.getElementById('theme-toggle');
        const themeIconSun = document.getElementById('theme-icon-sun');
        const themeIconMoon = document.getElementById('theme-icon-moon');
        const themeText = document.getElementById('theme-text');

        let allCategories = [];
        let detectedProjectPath = null;
        let currentSearchTerm = '';

        function initTheme() {
            const savedTheme = localStorage.getItem(CONFIG.THEME_KEY) || 'dark';
            applyTheme(savedTheme);
        }

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            if (theme === 'dark') {
                themeIconSun.style.display = 'none';
                themeIconMoon.style.display = 'block';
                themeText.textContent = '明亮模式';
            } else {
                themeIconSun.style.display = 'block';
                themeIconMoon.style.display = 'none';
                themeText.textContent = '暗黑模式';
            }
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            localStorage.setItem(CONFIG.THEME_KEY, newTheme);
            applyTheme(newTheme);
        }

        themeToggle.addEventListener('click', toggleTheme);
        initTheme();

        function showToast(msg, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = msg;
            toastContainer.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function setStatus(text, state = 'default') {
            statusText.textContent = text;
            statusDot.className = 'status-dot ' + state;
        }

        function parseFilePath() {
            const href = window.location.href;
            if (!href.startsWith('file:///')) return null;
            let path = decodeURIComponent(href.replace('file://', ''));
            if (path.match(/^\/[A-Z]:\//i)) path = path.substring(1);
            return path;
        }

        function detectProjectRoot(htmlFilePath) {
            if (!htmlFilePath) return null;
            const pathParts = htmlFilePath.split(/[\/\\]/).filter(Boolean);
            const tplAdminIndex = pathParts.findIndex(part => part === 'tpl.admin');
            if (tplAdminIndex !== -1) return pathParts.slice(0, tplAdminIndex + 1).join('/');
            return pathParts.slice(0, -1).join('/');
        }

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(CONFIG.DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(CONFIG.DB_STORE)) {
                        db.createObjectStore(CONFIG.DB_STORE);
                    }
                };
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function saveDirectoryHandle(handle) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(CONFIG.DB_STORE, 'readwrite');
                tx.objectStore(CONFIG.DB_STORE).put(handle, CONFIG.DB_KEY);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        async function getDirectoryHandle() {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(CONFIG.DB_STORE, 'readonly');
                const request = tx.objectStore(CONFIG.DB_STORE).get(CONFIG.DB_KEY);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        function parseTSFile(code) {
            const match = code.match(/export\s+const\s+ICON_BODY\s*:\s*string\s*=\s*(['"`])([\s\S]*?)\1/);
            if (match) return match[2].trim();
            return null;
        }

        async function getSubDirectory(parentHandle, path) {
            const parts = path.split('/').filter(Boolean);
            let current = parentHandle;
            for (const part of parts) {
                try {
                    current = await current.getDirectoryHandle(part, { create: false });
                } catch (err) {
                    throw new Error(`找不到目录: ${part}`);
                }
            }
            return current;
        }

        async function readIconFile(fileHandle) {
            const file = await fileHandle.getFile();
            const code = await file.text();
            const svgBody = parseTSFile(code);
            if (svgBody) {
                return {
                    name: fileHandle.name.replace(/\.tsx?$/, ''),
                    filename: fileHandle.name,
                    svgBody: svgBody,
                    code: code,
                };
            }
            return null;
        }

        async function loadIconsFromDirectory(dirHandle) {
            setStatus('正在扫描目录...', 'loading');

            allCategories = [];
            const subDirs = [];

            for await (const entry of dirHandle.values()) {
                if (entry.kind === 'directory') subDirs.push(entry);
            }

            subDirs.sort((a, b) => a.name.localeCompare(b.name));

            if (subDirs.length === 0) {
                setStatus('未找到分类目录', 'error');
                showToast('目录中没有找到分类子目录', 'error');
                return false;
            }

            setStatus(`找到 ${subDirs.length} 个分类，正在解析...`, 'loading');

            for (const subDir of subDirs) {
                const tsFiles = [];
                for await (const entry of subDir.values()) {
                    if (entry.kind === 'file' && /\.(ts|tsx)$/i.test(entry.name)) {
                        if (!entry.name.endsWith('.d.ts')) tsFiles.push(entry);
                    }
                }

                tsFiles.sort((a, b) => a.name.localeCompare(b.name));
                if (tsFiles.length === 0) continue;

                const icons = [];
                for (const fileHandle of tsFiles) {
                    const icon = await readIconFile(fileHandle);
                    if (icon) icons.push(icon);
                }

                if (icons.length > 0) {
                    allCategories.push({ name: subDir.name, icons: icons });
                }
            }

            const totalIcons = allCategories.reduce((sum, cat) => sum + cat.icons.length, 0);
            setStatus(`✓ 成功加载 ${allCategories.length} 个分类，${totalIcons} 个图标`, 'success');
            searchBar.classList.add('visible');
            renderIcons();
            showToast(`成功加载 ${totalIcons} 个图标`);
            return true;
        }

        async function requestPermission(handle) {
            const options = { mode: 'read' };
            return (await handle.requestPermission(options)) === 'granted';
        }

        function showAuthOverlay() { authOverlay.style.display = 'flex'; }
        function hideAuthOverlay() { authOverlay.style.display = 'none'; }

        async function tryAutoLoad() {
            try {
                const handle = await getDirectoryHandle();
                if (handle) {
                    setStatus('验证权限...', 'loading');
                    const granted = await requestPermission(handle);
                    if (granted) {
                        hideAuthOverlay();
                        const iconsDir = await getSubDirectory(handle, CONFIG.ICON_SUBDIR);
                        const success = await loadIconsFromDirectory(iconsDir);
                        if (!success) showAuthOverlay();
                        return;
                    }
                }
            } catch (err) {
                console.error('Auto load failed:', err);
            }

            const htmlPath = parseFilePath();
            detectedProjectPath = detectProjectRoot(htmlPath);

            if (detectedProjectPath) {
                projectPathEl.textContent = detectedProjectPath;
            } else {
                projectPathEl.textContent = '无法自动检测，请手动导航到 tpl.admin 目录';
            }

            showAuthOverlay();
            setStatus('等待授权...', 'default');
        }

        async function handleAuth() {
            if (!window.showDirectoryPicker) {
                showToast('当前浏览器不支持 File System Access API，请使用 Chrome/Edge 86+', 'error');
                return;
            }

            try {
                setStatus('请选择项目根目录...', 'loading');
                const rootHandle = await window.showDirectoryPicker({ mode: 'read' });

                try {
                    await getSubDirectory(rootHandle, CONFIG.ICON_SUBDIR);
                } catch (err) {
                    showToast('选择的目录不包含图标路径，请重新选择', 'error');
                    return;
                }

                await saveDirectoryHandle(rootHandle);
                hideAuthOverlay();

                const iconsDir = await getSubDirectory(rootHandle, CONFIG.ICON_SUBDIR);
                await loadIconsFromDirectory(iconsDir);

            } catch (err) {
                if (err.name !== 'AbortError') {
                    console.error(err);
                    showToast('授权失败', 'error');
                    setStatus('授权失败', 'error');
                }
            }
        }

        function getFilteredCategories() {
            if (!currentSearchTerm) return allCategories;

            const term = currentSearchTerm.toLowerCase();
            return allCategories
                .map(category => {
                    const categoryMatch = category.name.toLowerCase().includes(term);
                    const matchedIcons = categoryMatch
                        ? category.icons
                        : category.icons.filter(icon => icon.name.toLowerCase().includes(term));

                    if (matchedIcons.length > 0) return { ...category, icons: matchedIcons };
                    return null;
                })
                .filter(Boolean);
        }

        function getIconByGlobalIdx(idx, categories) {
            let currentIdx = 0;
            for (const category of categories) {
                for (const icon of category.icons) {
                    if (currentIdx === idx) return icon;
                    currentIdx++;
                }
            }
            return null;
        }

        function copyIconName(icon) {
            navigator.clipboard.writeText(icon.name).then(() => {
                showToast(`已复制: ${icon.name}`);
            });
        }

        function flashCard(cardEl) {
            cardEl.classList.add('copied');
            setTimeout(() => cardEl.classList.remove('copied'), 400);
        }

        function renderIcons() {
            const filteredCategories = getFilteredCategories();

            if (filteredCategories.length === 0) {
                iconContainer.innerHTML = `
                    <div class="empty-state">
                        <p>${currentSearchTerm ? '没有匹配的图标' : '暂无图标'}</p>
                    </div>
                `;
                return;
            }

            let html = '';
            let globalIdx = 0;

            filteredCategories.forEach((category) => {
                html += `
                    <div class="category-section">
                        <div class="category-header">
                            <div class="category-icon">${category.name.charAt(0).toUpperCase()}</div>
                            <h2 class="category-title">${category.name}</h2>
                            <span class="category-count">${category.icons.length} 个图标</span>
                        </div>
                        <div class="icon-grid">
                `;

                category.icons.forEach((icon) => {
                    html += `
                        <div class="icon-card" data-idx="${globalIdx}">
                            <div class="icon-actions">
                                <button class="action-btn copy-btn" data-idx="${globalIdx}" title="复制 SVG">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                                </button>
                                <button class="action-btn code-btn" data-idx="${globalIdx}" title="查看源码">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
                                </button>
                            </div>

                            <div class="icon-svg">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                                     style="width: 100%; height: 100%;">
                                    ${icon.svgBody}
                                </svg>
                            </div>

                            <div class="icon-name">${icon.name}</div>
                        </div>
                    `;
                    globalIdx++;
                });

                html += `</div></div>`;
            });

            iconContainer.innerHTML = html;

            // 点击卡片直接复制名称
            iconContainer.querySelectorAll('.icon-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    // 如果点击的是按钮，不触发卡片复制
                    if (e.target.closest('.action-btn')) return;

                    const idx = parseInt(card.dataset.idx);
                    const icon = getIconByGlobalIdx(idx, filteredCategories);
                    if (icon) {
                        copyIconName(icon);
                        flashCard(card);
                    }
                });
            });

            iconContainer.querySelectorAll('.copy-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const idx = parseInt(btn.dataset.idx);
                    const icon = getIconByGlobalIdx(idx, filteredCategories);
                    if (icon) {
                        const svgCode = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">\n  ${icon.svgBody}\n</svg>`;
                        navigator.clipboard.writeText(svgCode).then(() => {
                            showToast(`已复制 ${icon.name} 的 SVG`);
                        });
                    }
                });
            });

            iconContainer.querySelectorAll('.code-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const idx = parseInt(btn.dataset.idx);
                    const icon = getIconByGlobalIdx(idx, filteredCategories);
                    if (icon) showCodeModal(icon);
                });
            });
        }

        function showCodeModal(icon) {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-header">
                        <h3 class="modal-title">${icon.filename}</h3>
                        <button class="modal-close" onclick="this.closest('.modal').remove()">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                        </button>
                    </div>
                    <div class="code-block">${escapeHtml(icon.code)}</div>
                    <div class="modal-actions">
                        <button class="modal-btn" id="modal-copy-btn">复制代码</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);

            modal.querySelector('#modal-copy-btn').addEventListener('click', () => {
                navigator.clipboard.writeText(icon.code).then(() => {
                    const btn = modal.querySelector('#modal-copy-btn');
                    btn.textContent = '已复制!';
                    setTimeout(() => btn.textContent = '复制代码', 1500);
                });
            });
        }

        function escapeHtml(str) {
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        authBtn.addEventListener('click', handleAuth);

        copyPathBtn.addEventListener('click', () => {
            if (detectedProjectPath) {
                navigator.clipboard.writeText(detectedProjectPath).then(() => {
                    copyPathBtn.textContent = '已复制!';
                    setTimeout(() => copyPathBtn.textContent = '复制路径', 1500);
                    showToast('路径已复制到剪贴板');
                });
            }
        });

        searchInput.addEventListener('input', (e) => {
            currentSearchTerm = e.target.value.trim();
            renderIcons();
        });

        tryAutoLoad();
    </script>
</body>
</html>
