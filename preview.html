<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PrimeVue 主色候选清单</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-muted: #64748b;
      --text-inverse: #ffffff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 32px 24px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 22px;
      font-weight: 600;
    }

    .subtitle {
      margin: 0 0 32px;
      color: var(--text-muted);
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .card-head {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
    }

    .card-name {
      font-size: 16px;
      font-weight: 600;
      margin: 0;
    }

    .card-desc {
      font-size: 13px;
      color: var(--text-muted);
      margin: 4px 0 0;
    }

    .swatches {
      display: flex;
      flex-direction: column;
    }

    .swatch {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 8px 20px;
      font-size: 13px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .swatch .chip {
      width: 56px;
      height: 32px;
      border-radius: 6px;
      flex-shrink: 0;
    }

    .swatch .label {
      width: 40px;
      color: var(--text);
      font-weight: 500;
    }

    .swatch .hex {
      color: var(--text-muted);
    }

    .preview-row {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      background: #fbfdff;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      color: var(--text-inverse);
      font-size: 13px;
      font-weight: 500;
      cursor: default;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid currentColor;
    }

    .tag {
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-inverse);
    }

    .note {
      margin-top: 28px;
      padding: 14px 18px;
      background: #f1f5f9;
      border-left: 3px solid #94a3b8;
      border-radius: 4px;
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .note code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      background: #e2e8f0;
      padding: 1px 5px;
      border-radius: 3px;
      color: var(--text);
    }
  </style>
</head>
<body>
  <h1>PrimeVue 主色候选清单</h1>
  <p class="subtitle">
    四套候选 primary 色板（50–950）。下方按钮预览以 500/600 色阶作为主色与 hover。
  </p>

  <div class="grid" id="grid"></div>

  <div class="note">
    说明：色值取自 Tailwind 调色板，与 <code>@primeuix/themes</code> 内置令牌一致。
    方式一会用对应色板覆盖 Aura preset 的 <code>semantic.primary</code> 全部色阶（50–950），
    其余令牌（neutral、surface、圆角、间距）保留 Aura 默认。
  </div>

  <script>
    const PALETTES = [
      {
        name: 'blue',
        title: 'Blue · 蓝',
        desc: '通用商务蓝，冷静、可靠、信息密度高',
        swatches: {
          50:  '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd',
          400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8',
          800: '#1e40af', 900: '#1e3a8a', 950: '#172554'
        }
      },
      {
        name: 'indigo',
        title: 'Indigo · 靛蓝',
        desc: '偏紫的深蓝，现代 SaaS 常用，比 blue 更有辨识度',
        swatches: {
          50:  '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc',
          400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca',
          800: '#3730a3', 900: '#312e81', 950: '#1e1b4b'
        }
      },
      {
        name: 'violet',
        title: 'Violet · 紫罗兰',
        desc: '纯紫调，活泼有设计感，适合创意/品牌向后台',
        swatches: {
          50:  '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd',
          400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9',
          800: '#5b21b6', 900: '#4c1d95', 950: '#2e1065'
        }
      },
      {
        name: 'slate',
        title: 'Slate · 石板灰',
        desc: '中性灰蓝，克制低调，适合数据密集型表格后台',
        swatches: {
          50:  '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1',
          400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155',
          800: '#1e293b', 900: '#0f172a', 950: '#020617'
        }
      }
    ];

    const grid = document.getElementById('grid');

    for (const p of PALETTES) {
      const s = p.swatches;
      const swatchRows = Object.entries(s)
        .map(([step, hex]) => `
          <div class="swatch">
            <div class="chip" style="background:${hex}"></div>
            <span class="label">${step}</span>
            <span class="hex">${hex}</span>
          </div>`)
        .join('');

      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-head">
          <h2 class="card-name">${p.title}</h2>
          <p class="card-desc">${p.desc}</p>
        </div>
        <div class="swatches">${swatchRows}</div>
        <div class="preview-row" style="color:${s[600]}">
          <span class="btn" style="background:${s[500]}">主按钮</span>
          <span class="btn" style="background:${s[600]}">hover</span>
          <span class="btn btn-outline">描边按钮</span>
          <span class="tag" style="background:${s[500]}">Tag</span>
        </div>`;
      grid.appendChild(card);
    }
  </script>
</body>
</html>
